<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Five Buttons Task</title>
   <link rel="stylesheet" href="style.css">
   <script src="script.js" defer></script>
</head>
<body>
   <div class="main-container">
      <div class="shrink-container container">
         <button class="size-modification-button" value="shrink">Shrink</button>
         <div id="shrink-rectangle" class="rectangle"></div>
      </div>
      <div class="expand-container container">
         <button class="size-modification-button" value="expand">Expand</button>
         <div id="expand-rectangle" class="rectangle"></div>
      </div>
      <div class="red-container container">
         <button class="color-button" value="red-bg">Red</button>
         <div id="red-rectangle" class="rectangle"></div>
      </div>
      <div class="blue-container container">
         <button class="color-button" value="blue-bg">Blue</button>
         <div id="blue-rectangle" class="rectangle"></div>
      </div>
      <div class="green-container container">
         <button class="color-button" value="green-bg">Green</button>
         <div id="green-rectangle" class="rectangle"></div>
      </div>
   </div>
</body>
</html>
