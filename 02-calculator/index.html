<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Calculator</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="main-container">
      <div class="equation-and-result-container">
         <div class="equation-container">
            <p class="equation-text" id="equation-text">6</p>
         </div>
         <div class="result-container">
            <p class="result-text">=6</p>
         </div>
      </div>
      <div class="buttons-container">
         <div class="row-1">
            <button id="button-clear" class="button-clear">C</button>
            <button id="button-backspace" class="button-backspace">&#8592</button>
            <button id="button-percent" class="button-percent">&#37</button>
            <button id="button-divide" class="button-divide">&#247</button>
         </div>
         <div class="row-2">
            <button id="button-seven" class="button-seven">7</button>
            <button id="button-eight" class="button-eight">8</button>
            <button id="button-nine" class="button-nine">9</button>
            <button id="button-multiply" class="button-multiply">&#215</button>
         </div>
         <div class="row-3">
            <button id="button-four" class="button-four">4</button>
            <button id="button-five" class="button-five">5</button>
            <button id="button-six" class="button-six">6</button>
            <button id="button-minus" class="button-minus">&#8722</button>
         </div>
         <div class="row-4">
            <button id="button-one" class="button-one">1</button>
            <button id="button-two" class="button-two">2</button>
            <button id="button-three" class="button-three">3</button>
            <button id="button-plus" class="button-plus">&#43</button>
         </div>
         <div class="row-5">
            <button id="button-zero" class="button-zero">0</button>
            <button id="button-decimal" class="button-decimal">.</button>
            <button id="button-equal" class="button-equal">&#61</button>
         </div>
      </div>
   </div>
</body>
</html>
