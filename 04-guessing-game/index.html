<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Guessing Game</title>
   <link rel="stylesheet" href="style.css">
   <script src="script.js" defer></script>
</head>
<body>
   <div id="main-container" class="main-container">
      <div id="title-bar" class="title-bar">
         <p id="title-text" class="title-text">Guess the Colors</p>
         <button id="start-btn" class="start-btn">
            PLAY
         </button>
      </div>
      <div id="answer-container" class="answer-container">
         <div id="answer-color-ball-1" class="answer-color-ball-1"></div>
         <div id="answer-color-ball-2" class="answer-color-ball-2"></div>
         <div id="answer-color-ball-3" class="answer-color-ball-3"></div>
         <div id="answer-color-ball-4" class="answer-color-ball-4"></div>
         <button id="surrender-btn" class="surrender-btn" style="display: none;"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" class="bi bi-flag-fill" viewBox="0 0 16 16">
  <path d="M14.778.085A.5.5 0 0 1 15 .5V8a.5.5 0 0 1-.314.464L14.5 8l.186.464-.003.001-.006.003-.023.009a12 12 0 0 1-.397.15c-.264.095-.631.223-1.047.35-.816.252-1.879.523-2.71.523-.847 0-1.548-.28-2.158-.525l-.028-.01C7.68 8.71 7.14 8.5 6.5 8.5c-.7 0-1.638.23-2.437.477A20 20 0 0 0 3 9.342V15.5a.5.5 0 0 1-1 0V.5a.5.5 0 0 1 1 0v.282c.226-.079.496-.17.79-.26C4.606.272 5.67 0 6.5 0c.84 0 1.524.277 2.121.519l.043.018C9.286.788 9.828 1 10.5 1c.7 0 1.638-.23 2.437-.477a20 20 0 0 0 1.349-.476l.019-.007.004-.002h.001"/>
</svg></button>
      </div>
      <div id="guessing-container" class="guessing-container" style="display: none;">
         <div id="guess-color-ball-1" class="guess-color-ball-1" color=""></div>
         <div id="guess-color-ball-2" class="guess-color-ball-2" color=""></div>
         <div id="guess-color-ball-3" class="guess-color-ball-3" color=""></div>
         <div id="guess-color-ball-4" class="guess-color-ball-4" color=""></div>
         <button id="guess-btn" class="guess-btn"><svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="white" class="bi bi-eye-fill" viewBox="0 0 16 16">
  <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
  <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7"/>
</svg></button>
      </div>
      <div id="guesses-container" class="guesses-container" style="display: none;"></div>
   </div>
</body>
</html>
