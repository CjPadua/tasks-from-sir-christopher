<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Guessing Game</title>
   <link rel="stylesheet" href="style.css">
   <script src="script.js" defer></script>
</head>
<body>
   <div id="main-container" class="main-container">
      <div id="answer-container" class="answer-container">
         <div id="answer-color-ball-1" class="answer-color-ball-1">?</div>
         <div id="answer-color-ball-2" class="answer-color-ball-2">?</div>
         <div id="answer-color-ball-3" class="answer-color-ball-3">?</div>
         <div id="answer-color-ball-4" class="answer-color-ball-4">?</div>
         <button id="surrender-btn" class="surrender-btn">S</button>
      </div>
   </div>
   <div id="guessing-container" class="guessing-container">
         <div id="guess-color-ball-1" class="guess-color-ball-1" color="yellow"></div>
         <div id="guess-color-ball-2" class="guess-color-ball-2" color="yellow"></div>
         <div id="guess-color-ball-3" class="guess-color-ball-3" color="yellow"></div>
         <div id="guess-color-ball-4" class="guess-color-ball-4" color="yellow"></div>
         <button id="guess-btn" class="guess-btn">G</button>
   </div>
</body>
</html>
